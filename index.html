<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriAvalia — Sistema de Avaliação Nutricional Escolar</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #2ecc71; --green-dark: #27ae60; --green-light: #d5f5e3;
    --orange: #f39c12; --orange-light: #fef9e7;
    --red: #e74c3c; --blue: #3498db; --blue-dark: #2980b9;
    --purple: #9b59b6; --teal: #1abc9c;
    --bg: #f0faf4; --card: #ffffff; --text: #2c3e50; --muted: #7f8c8d;
    --border: #dfe6e9; --shadow: 0 4px 24px rgba(46,204,113,0.10);
    --radius: 18px; --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  h1,h2,h3 { font-family: 'Fredoka One', cursive; }
  button { cursor: pointer; border: none; outline: none; font-family: 'Nunito', sans-serif; }
  input, select, textarea { font-family: 'Nunito', sans-serif; }
  .app { display: flex; min-height: 100vh; }

  /* SIDEBAR */
  .sidebar { width: 260px; background: linear-gradient(160deg, #1a6b3c 0%, #27ae60 100%); color: #fff; display: flex; flex-direction: column; padding: 0; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; box-shadow: 4px 0 24px rgba(0,0,0,0.10); }
  .sidebar-logo { padding: 28px 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.15); }
  .sidebar-logo h1 { font-size: 1.7rem; color: #fff; letter-spacing: 1px; }
  .sidebar-logo p { font-size: 0.75rem; opacity: 0.75; margin-top: 2px; font-weight: 600; }
  .sidebar-school { padding: 14px 24px; background: rgba(255,255,255,0.10); margin: 12px 16px; border-radius: 12px; font-size: 0.8rem; font-weight: 700; }
  .sidebar-school span { opacity: 0.7; font-weight: 400; display: block; font-size: 0.72rem; }
  .sidebar-nav { flex: 1; padding: 8px 0; overflow-y: auto; }
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 13px 24px; font-size: 0.88rem; font-weight: 700; color: rgba(255,255,255,0.8); transition: all 0.2s; cursor: pointer; border-left: 3px solid transparent; }
  .nav-item:hover { background: rgba(255,255,255,0.12); color: #fff; }
  .nav-item.active { background: rgba(255,255,255,0.18); color: #fff; border-left-color: #fff; }
  .nav-item .icon { font-size: 1.2rem; width: 22px; text-align: center; }
  .nav-section { padding: 14px 24px 6px; font-size: 0.68rem; font-weight: 800; color: rgba(255,255,255,0.45); letter-spacing: 1.5px; text-transform: uppercase; }
  .sidebar-footer { padding: 16px 24px; border-top: 1px solid rgba(255,255,255,0.15); }
  .sidebar-user { display: flex; align-items: center; gap: 10px; }
  .avatar { width: 36px; height: 36px; background: rgba(255,255,255,0.25); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 800; }
  .user-info { flex: 1; }
  .user-name { font-size: 0.82rem; font-weight: 800; }
  .user-role { font-size: 0.68rem; opacity: 0.65; }
  .logout-btn { background: rgba(255,255,255,0.15); color: #fff; border-radius: 8px; padding: 5px 10px; font-size: 0.75rem; font-weight: 700; }
  .logout-btn:hover { background: rgba(255,255,255,0.25); }

  /* MAIN */
  .main { margin-left: 260px; flex: 1; padding: 32px; }
  .page-header { margin-bottom: 28px; }
  .page-header h2 { font-size: 2rem; color: var(--text); }
  .page-header p { color: var(--muted); margin-top: 4px; font-size: 0.9rem; }
  .breadcrumb { font-size: 0.8rem; color: var(--muted); margin-bottom: 8px; }

  /* CARDS */
  .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 24px; }
  .card-sm { background: var(--card); border-radius: var(--radius-sm); box-shadow: var(--shadow); padding: 18px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }

  /* STAT CARDS */
  .stat-card { background: var(--card); border-radius: var(--radius); padding: 22px 24px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 16px; }
  .stat-icon { width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; flex-shrink: 0; }
  .stat-val { font-size: 1.8rem; font-weight: 900; line-height: 1; }
  .stat-label { font-size: 0.78rem; color: var(--muted); margin-top: 3px; font-weight: 600; }

  /* BUTTONS */
  .btn { padding: 10px 22px; border-radius: 10px; font-weight: 700; font-size: 0.88rem; transition: all 0.18s; display: inline-flex; align-items: center; gap: 7px; }
  .btn-primary { background: var(--green); color: #fff; }
  .btn-primary:hover { background: var(--green-dark); transform: translateY(-1px); }
  .btn-outline { background: transparent; border: 2px solid var(--green); color: var(--green); }
  .btn-outline:hover { background: var(--green-light); }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-danger:hover { background: #c0392b; }
  .btn-blue { background: var(--blue); color: #fff; }
  .btn-blue:hover { background: var(--blue-dark); }
  .btn-orange { background: var(--orange); color: #fff; }
  .btn-sm { padding: 6px 14px; font-size: 0.78rem; border-radius: 8px; }

  /* FORMS */
  .form-group { margin-bottom: 18px; }
  .form-label { display: block; font-weight: 700; font-size: 0.82rem; margin-bottom: 6px; color: var(--text); }
  .form-input { width: 100%; padding: 11px 14px; border: 2px solid var(--border); border-radius: 10px; font-size: 0.88rem; transition: border 0.2s; background: #fafafa; }
  .form-input:focus { outline: none; border-color: var(--green); background: #fff; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

  /* TABLES */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 12px 16px; background: var(--bg); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); }
  td { padding: 13px 16px; border-bottom: 1px solid var(--border); font-size: 0.86rem; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg); }

  /* BADGES */
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 100px; font-size: 0.72rem; font-weight: 800; }
  .badge-green { background: var(--green-light); color: var(--green-dark); }
  .badge-orange { background: #fef9e7; color: #e67e22; }
  .badge-red { background: #fdedec; color: var(--red); }
  .badge-blue { background: #ebf5fb; color: var(--blue-dark); }
  .badge-purple { background: #f5eef8; color: var(--purple); }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 999; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal { background: #fff; border-radius: 20px; padding: 32px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); position: relative; }
  .modal-lg { max-width: 780px; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .modal-title { font-size: 1.4rem; }
  .modal-close { width: 34px; height: 34px; border-radius: 50%; background: var(--bg); color: var(--muted); font-size: 1.1rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .modal-close:hover { background: var(--border); color: var(--text); }

  /* LOGIN */
  .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a6b3c 0%, #27ae60 60%, #2ecc71 100%); }
  .login-card { background: #fff; border-radius: 24px; padding: 48px 40px; width: 100%; max-width: 420px; box-shadow: 0 24px 64px rgba(0,0,0,0.18); }
  .login-logo { text-align: center; margin-bottom: 32px; }
  .login-logo h1 { font-size: 2.2rem; color: var(--green-dark); }
  .login-logo p { color: var(--muted); font-size: 0.88rem; margin-top: 4px; font-weight: 600; }
  .login-logo .emoji { font-size: 3rem; display: block; margin-bottom: 8px; }

  /* VOTING SCREEN */
  .voting-screen { min-height: 100vh; background: linear-gradient(135deg, #e8f8f1 0%, #d5f5e3 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
  .voting-header { text-align: center; margin-bottom: 24px; }
  .voting-header h2 { font-size: 2.2rem; color: var(--green-dark); }
  .voting-header p { color: var(--muted); font-weight: 700; font-size: 1rem; }
  .dish-card { background: #fff; border-radius: 28px; padding: 28px; max-width: 480px; width: 100%; box-shadow: 0 8px 40px rgba(46,204,113,0.18); text-align: center; }
  .dish-image { width: 100%; height: 240px; object-fit: cover; border-radius: 18px; margin-bottom: 20px; background: linear-gradient(135deg, #d5f5e3, #a9dfbf); display: flex; align-items: center; justify-content: center; font-size: 5rem; }
  .dish-name { font-size: 1.5rem; color: var(--text); margin-bottom: 6px; }
  .dish-desc { font-size: 0.88rem; color: var(--muted); margin-bottom: 28px; }
  .vote-question { font-size: 1.2rem; font-weight: 800; color: var(--text); margin-bottom: 20px; }
  .vote-faces { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
  .face-btn { background: none; border: 3px solid transparent; border-radius: 20px; padding: 12px 10px; transition: all 0.25s; display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 76px; }
  .face-btn:hover { transform: scale(1.12) translateY(-4px); border-color: var(--green); background: var(--green-light); }
  .face-btn.selected { border-color: var(--green-dark); background: var(--green-light); transform: scale(1.12); }
  .face-emoji { font-size: 3rem; line-height: 1; }
  .face-label { font-size: 0.72rem; font-weight: 800; color: var(--muted); }
  .vote-progress { margin-top: 20px; }
  .progress-bar { height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 99px; transition: width 0.5s; }
  .progress-text { font-size: 0.78rem; color: var(--muted); margin-top: 6px; font-weight: 700; }

  /* TOAST */
  .toast { position: fixed; bottom: 28px; right: 28px; background: var(--green-dark); color: #fff; padding: 14px 22px; border-radius: 14px; font-weight: 700; font-size: 0.9rem; z-index: 9999; box-shadow: 0 8px 24px rgba(0,0,0,0.18); animation: slideUp 0.3s ease; display: flex; align-items: center; gap: 8px; }
  .toast-error { background: var(--red); }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  /* SUCCESS ANIMATION */
  .success-overlay { position: fixed; inset: 0; background: rgba(46,204,113,0.92); z-index: 8888; display: flex; flex-direction: column; align-items: center; justify-content: center; animation: fadeInOut 2.5s ease forwards; }
  .success-overlay .big-emoji { font-size: 7rem; animation: bounceIn 0.5s ease; }
  .success-overlay h2 { font-size: 2.5rem; color: #fff; margin-top: 16px; animation: fadeIn 0.5s 0.3s both; }
  @keyframes fadeInOut { 0%{opacity:0} 15%{opacity:1} 75%{opacity:1} 100%{opacity:0} }
  @keyframes bounceIn { 0%{transform:scale(0)} 60%{transform:scale(1.2)} 100%{transform:scale(1)} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  /* CHART CONTAINER */
  .chart-container { position: relative; height: 280px; }
  .chart-container-lg { position: relative; height: 360px; }

  /* FILTERS BAR */
  .filters-bar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
  .filter-select { padding: 8px 14px; border: 2px solid var(--border); border-radius: 10px; font-size: 0.82rem; font-weight: 700; background: #fff; color: var(--text); }
  .filter-select:focus { outline: none; border-color: var(--green); }

  /* MENU WEEK */
  .week-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 10px; margin-bottom: 20px; }
  .day-tab { padding: 10px 6px; border-radius: 12px; text-align: center; cursor: pointer; border: 2px solid var(--border); background: #fff; transition: all 0.2s; }
  .day-tab.active { border-color: var(--green); background: var(--green-light); }
  .day-tab .day-name { font-size: 0.72rem; font-weight: 800; color: var(--muted); text-transform: uppercase; }
  .day-tab .day-num { font-size: 1.3rem; font-weight: 900; color: var(--text); }
  .day-tab.active .day-name, .day-tab.active .day-num { color: var(--green-dark); }
  .day-tab.has-menu { background: var(--green-light); border-color: var(--green); }

  /* DISH LIST */
  .dish-list { display: flex; flex-direction: column; gap: 14px; }
  .dish-item { display: flex; gap: 16px; align-items: center; background: var(--bg); border-radius: 14px; padding: 14px; border: 2px solid transparent; transition: all 0.2s; }
  .dish-item:hover { border-color: var(--green); background: var(--green-light); }
  .dish-thumb { width: 64px; height: 64px; border-radius: 12px; object-fit: cover; background: linear-gradient(135deg, #d5f5e3, #a9dfbf); display: flex; align-items: center; justify-content: center; font-size: 2rem; flex-shrink: 0; overflow: hidden; }
  .dish-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .dish-info { flex: 1; }
  .dish-info .name { font-weight: 800; font-size: 0.92rem; }
  .dish-info .category { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
  .dish-actions { display: flex; gap: 8px; }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
  .empty .emoji { font-size: 3.5rem; display: block; margin-bottom: 12px; }
  .empty p { font-size: 0.9rem; font-weight: 600; }

  /* TABS */
  .tabs { display: flex; gap: 0; margin-bottom: 24px; border-bottom: 2px solid var(--border); }
  .tab { padding: 10px 22px; font-weight: 800; font-size: 0.85rem; color: var(--muted); border-bottom: 3px solid transparent; margin-bottom: -2px; cursor: pointer; transition: all 0.2s; }
  .tab.active { color: var(--green-dark); border-bottom-color: var(--green); }

  /* INVITE */
  .invite-link { background: var(--bg); border-radius: 10px; padding: 12px 16px; font-size: 0.82rem; font-family: monospace; word-break: break-all; color: var(--blue-dark); border: 2px dashed var(--blue); }

  /* PHOTO UPLOAD */
  .photo-upload { border: 3px dashed var(--border); border-radius: 16px; padding: 32px; text-align: center; cursor: pointer; transition: all 0.2s; background: #fafafa; }
  .photo-upload:hover { border-color: var(--green); background: var(--green-light); }
  .photo-upload input { display: none; }
  .photo-preview { width: 100%; max-height: 200px; object-fit: cover; border-radius: 12px; margin-top: 12px; }

  /* NOTIFICATION DOT */
  .notif { width: 8px; height: 8px; background: #e74c3c; border-radius: 50%; display: inline-block; margin-left: 4px; }

  /* CONFIRM DIALOG */
  .confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 9998; display: flex; align-items: center; justify-content: center; padding: 20px; animation: fadeInBg 0.15s ease; }
  @keyframes fadeInBg { from{opacity:0} to{opacity:1} }
  .confirm-box { background: #fff; border-radius: 20px; padding: 32px 28px; width: 100%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); text-align: center; animation: popIn 0.2s ease; }
  @keyframes popIn { from{transform:scale(0.9);opacity:0} to{transform:scale(1);opacity:1} }
  .confirm-icon { font-size: 3rem; margin-bottom: 12px; }
  .confirm-title { font-family: 'Fredoka One', cursive; font-size: 1.4rem; color: var(--text); margin-bottom: 8px; }
  .confirm-msg { font-size: 0.88rem; color: var(--muted); font-weight: 600; margin-bottom: 24px; }
  .confirm-btns { display: flex; gap: 12px; justify-content: center; }
  .confirm-btns .btn { min-width: 110px; justify-content: center; }

  @media (max-width: 768px) {
    /* Sidebar vira menu inferior no celular */
    .sidebar {
      width: 100% !important;
      height: 64px;
      top: auto;
      bottom: 0;
      left: 0;
      flex-direction: row;
      padding: 0;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.12);
    }
    .sidebar-logo { display: none; }
    .sidebar-school { display: none; }
    .sidebar-footer { display: none; }
    .nav-section { display: none; }
    .sidebar-nav {
      display: flex;
      flex-direction: row;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 0;
      width: 100%;
      scrollbar-width: none;
    }
    .sidebar-nav::-webkit-scrollbar { display: none; }
    .nav-item {
      flex-direction: column;
      padding: 8px 12px;
      gap: 3px;
      border-left: none !important;
      border-top: 3px solid transparent;
      min-width: 64px;
      font-size: 0.6rem;
      flex-shrink: 0;
    }
    .nav-item.active { border-top-color: #fff; border-left: none; background: rgba(255,255,255,0.18); }
    .nav-item .icon { font-size: 1.3rem; width: auto; }
    .nav-item span:not(.icon) { display: block !important; font-size: 0.58rem; white-space: nowrap; }

    /* Main ocupa tudo, deixando espaço pro menu inferior */
    .main { margin-left: 0 !important; padding: 16px 14px 80px; width: 100%; }

    /* Grids */
    .grid-4 { grid-template-columns: 1fr 1fr; }
    .grid-3 { grid-template-columns: 1fr; }
    .grid-2 { grid-template-columns: 1fr; }
    .week-grid { grid-template-columns: repeat(4,1fr); }

    /* Page header */
    .page-header { flex-direction: column !important; gap: 12px; align-items: flex-start !important; }
    .page-header h2 { font-size: 1.5rem; }

    /* Tabela */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table { min-width: 500px; }

    /* Formulários */
    .form-row { grid-template-columns: 1fr !important; }
    .form-row-3 { grid-template-columns: 1fr !important; }

    /* Cards de prato */
    .dish-item { flex-wrap: wrap; }

    /* Filtros */
    .filters-bar { flex-direction: column; align-items: stretch; }
    .filter-select { width: 100%; }

    /* Modal */
    .modal { padding: 24px 18px; margin: 10px; }
    .modal-lg { max-width: 100%; }

    /* Stat cards */
    .stat-card { padding: 16px; }
    .stat-val { font-size: 1.4rem; }

    /* Voting screen */
    .dish-card { padding: 18px; }
    .dish-image { height: 180px; }
    .face-btn { min-width: 64px; padding: 8px 6px; }
    .face-emoji { font-size: 2.4rem; }

    /* Topo móvel com nome do usuário */
    .mobile-topbar { display: flex !important; }
  }

  /* Topbar mobile (oculta no desktop) */
  .mobile-topbar {
    display: none;
    background: linear-gradient(90deg, #1a6b3c, #27ae60);
    color: #fff;
    padding: 14px 16px;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 99;
    box-shadow: 0 2px 12px rgba(0,0,0,0.12);
  }
  .mobile-topbar h1 { font-size: 1.2rem; color: #fff; }
  .mobile-topbar .mob-user { font-size: 0.75rem; opacity: 0.85; font-weight: 700; }
</style>

</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ===================== DATABASE (IndexedDB) =====================
const DB_NAME = 'NutriAvaliaDB', DB_VER = 1;
let db = null;
function openDB() {
  return new Promise((res, rej) => {
    if (db) return res(db);
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('users')) d.createObjectStore('users', {keyPath:'id'});
      if (!d.objectStoreNames.contains('schools')) d.createObjectStore('schools', {keyPath:'id'});
      if (!d.objectStoreNames.contains('menus')) d.createObjectStore('menus', {keyPath:'id'});
      if (!d.objectStoreNames.contains('dishes')) d.createObjectStore('dishes', {keyPath:'id'});
      if (!d.objectStoreNames.contains('votes')) d.createObjectStore('votes', {keyPath:'id'});
      if (!d.objectStoreNames.contains('invites')) d.createObjectStore('invites', {keyPath:'id'});
    };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror = () => rej(req.error);
  });
}
function dbGet(store, id) { return openDB().then(d => new Promise((res,rej) => { const tx=d.transaction(store,'readonly'); const r=tx.objectStore(store).get(id); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); })); }
function dbGetAll(store) { return openDB().then(d => new Promise((res,rej) => { const tx=d.transaction(store,'readonly'); const r=tx.objectStore(store).getAll(); r.onsuccess=()=>res(r.result||[]); r.onerror=()=>rej(r.error); })); }
function dbPut(store, obj) { return openDB().then(d => new Promise((res,rej) => { const tx=d.transaction(store,'readwrite'); const r=tx.objectStore(store).put(obj); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); })); }
function dbDelete(store, id) { return openDB().then(d => new Promise((res,rej) => { const tx=d.transaction(store,'readwrite'); const r=tx.objectStore(store).delete(id); r.onsuccess=()=>res(); r.onerror=()=>rej(r.error); })); }
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function hashPw(pw) { let h=0; for(let c of pw){h=((h<<5)-h)+c.charCodeAt(0);h|=0;} return h.toString(36); }

// ===================== TOAST =====================
function Toast({msg, type, onDone}) {
  useEffect(() => { const t = setTimeout(onDone, 3000); return () => clearTimeout(t); }, []);
  return <div className={`toast ${type==='error'?'toast-error':''}`}>{type==='error'?'❌':'✅'} {msg}</div>;
}

// ===================== CONFIRM DIALOG =====================
function ConfirmDialog({icon='🗑️', title, message, onConfirm, onCancel, confirmLabel='Deletar', confirmClass='btn-danger'}) {
  return (
    <div className="confirm-overlay" onClick={e=>e.target===e.currentTarget&&onCancel()}>
      <div className="confirm-box">
        <div className="confirm-icon">{icon}</div>
        <div className="confirm-title">{title}</div>
        <div className="confirm-msg">{message}</div>
        <div className="confirm-btns">
          <button className="btn btn-outline" onClick={onCancel}>Cancelar</button>
          <button className={`btn ${confirmClass}`} onClick={onConfirm}>{confirmLabel}</button>
        </div>
      </div>
    </div>
  );
}

function useConfirm() {
  const [cfg, setCfg] = useState(null);
  const confirm = useCallback((options) => new Promise(resolve => {
    setCfg({ ...options, resolve });
  }), []);
  const dialog = cfg ? (
    <ConfirmDialog
      icon={cfg.icon} title={cfg.title} message={cfg.message}
      confirmLabel={cfg.confirmLabel||'Deletar'} confirmClass={cfg.confirmClass||'btn-danger'}
      onConfirm={() => { cfg.resolve(true); setCfg(null); }}
      onCancel={() => { cfg.resolve(false); setCfg(null); }}
    />
  ) : null;
  return [confirm, dialog];
}

function VotingPage({user}) {
  const [schools, setSchools] = useState([]);
  const [selSchool, setSelSchool] = useState('');
  const [dishes, setDishes] = useState([]);
  const [menus, setMenus] = useState([]);
  const [current, setCurrent] = useState(0);
  const [selected, setSelected] = useState(null);
  const [showSuccess, setShowSuccess] = useState(false);
  const [done, setDone] = useState(false);
  const audioCtx = useRef(null);

  useEffect(() => {
    dbGetAll('schools').then(s => { setSchools(s); if(user.schoolId) setSelSchool(user.schoolId); });
  }, []);

  useEffect(() => {
    if (!selSchool) return;
    const today = new Date().toISOString().slice(0,10);
    dbGetAll('menus').then(all => {
      const m = all.filter(x => x.schoolId===selSchool && x.date===today);
      setMenus(m);
      const dishIds = [...new Set(m.flatMap(x=>x.dishIds||[]))];
      dbGetAll('dishes').then(all => setDishes(all.filter(d=>dishIds.includes(d.id))));
    });
  }, [selSchool]);

  function playUrna() {
    try {
      const ctx = new (window.AudioContext||window.webkitAudioContext)();
      [440,550,660,880].forEach((f,i) => {
        const o=ctx.createOscillator(), g=ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value=f; g.gain.setValueAtTime(0.3,ctx.currentTime+i*0.12);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.12+0.25);
        o.start(ctx.currentTime+i*0.12); o.stop(ctx.currentTime+i*0.12+0.3);
      });
    } catch(e) {}
  }

  async function handleVote(rating) {
    if (selected !== null) return;
    setSelected(rating);
    const dish = dishes[current];
    await dbPut('votes', { id:uid(), dishId:dish.id, schoolId:selSchool, rating, date:new Date().toISOString().slice(0,10), ts:Date.now() });
    setTimeout(() => {
      playUrna();
      setShowSuccess(true);
      setTimeout(() => {
        setShowSuccess(false);
        setSelected(null);
        if (current + 1 >= dishes.length) setDone(true);
        else setCurrent(c => c+1);
      }, 2500);
    }, 300);
  }

  const faces = [
    {emoji:'😍', label:'Amei!', value:4, color:'#2ecc71'},
    {emoji:'😊', label:'Gostei', value:3, color:'#3498db'},
    {emoji:'😐', label:'Mais ou menos', value:2, color:'#f39c12'},
    {emoji:'😞', label:'Não gostei', value:1, color:'#e74c3c'},
  ];

  if (!selSchool && user.role==='superadmin') return (
    <div className="voting-screen">
      <div className="dish-card">
        <div style={{fontSize:'3rem',textAlign:'center',marginBottom:16}}>🏫</div>
        <h3 style={{textAlign:'center',marginBottom:16,fontFamily:'Fredoka One'}}>Selecionar Escola</h3>
        <select className="form-input" value={selSchool} onChange={e=>setSelSchool(e.target.value)}>
          <option value="">Escolha uma escola...</option>
          {schools.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
        </select>
      </div>
    </div>
  );

  if (!dishes.length) return (
    <div className="voting-screen">
      <div className="dish-card"><div className="empty"><span className="emoji">🍽️</span><p>Nenhum prato cadastrado para hoje!</p><p style={{fontSize:'0.8rem',marginTop:8}}>Peça à nutricionista para cadastrar o cardápio.</p></div></div>
    </div>
  );

  if (done) return (
    <div className="voting-screen">
      <div className="dish-card" style={{textAlign:'center'}}>
        <div style={{fontSize:'5rem',marginBottom:16}}>🎉</div>
        <h2 style={{fontFamily:'Fredoka One',fontSize:'2rem',color:'var(--green-dark)'}}>Obrigado!</h2>
        <p style={{color:'var(--muted)',marginTop:8,fontWeight:700}}>Todas as avaliações foram registradas!</p>
        <button className="btn btn-primary" style={{marginTop:20}} onClick={()=>{setCurrent(0);setDone(false);}}>🔄 Avaliar novamente</button>
      </div>
    </div>
  );

  const dish = dishes[current];
  return (
    <div className="voting-screen">
      {showSuccess && (
        <div className="success-overlay">
          <div className="big-emoji">🗳️</div>
          <h2>Voto Registrado!</h2>
        </div>
      )}
      <div className="voting-header">
        <h2>O que você achou?</h2>
        <p>{new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'})}</p>
      </div>
      <div className="dish-card">
        <div className="dish-image">
          {dish.photo ? <img src={dish.photo} alt={dish.name} style={{width:'100%',height:'100%',objectFit:'cover',borderRadius:18}} /> : <span>🍽️</span>}
        </div>
        <div className="dish-name">{dish.name}</div>
        {dish.description && <div className="dish-desc">{dish.description}</div>}
        <div className="vote-question">Como você avaliaria esse prato? 😋</div>
        <div className="vote-faces">
          {faces.map(f => (
            <button key={f.value} className={`face-btn ${selected===f.value?'selected':''}`} onClick={()=>handleVote(f.value)} disabled={selected!==null} style={{borderColor:selected===f.value?f.color:'transparent',background:selected===f.value?f.color+'22':''}}>
              <span className="face-emoji">{f.emoji}</span>
              <span className="face-label">{f.label}</span>
            </button>
          ))}
        </div>
        <div className="vote-progress">
          <div className="progress-bar"><div className="progress-fill" style={{width:`${((current+1)/dishes.length)*100}%`}}></div></div>
          <div className="progress-text">Prato {current+1} de {dishes.length}</div>
        </div>
      </div>
    </div>
  );
}

function MiniChart({votes, dishes}) {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    if (chartRef.current) chartRef.current.destroy();
    const counts = [0,0,0,0];
    votes.forEach(v => { if(v.rating>=1&&v.rating<=4) counts[v.rating-1]++; });
    chartRef.current = new Chart(ref.current, {
      type:'doughnut',
      data:{ labels:['Não Gostei','Mais ou menos','Gostei','Amei!'], datasets:[{data:counts, backgroundColor:['#e74c3c','#f39c12','#3498db','#2ecc71'], borderWidth:0, hoverOffset:8 }] },
      options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom',labels:{font:{family:'Nunito',size:11},padding:12}}} }
    });
    return () => chartRef.current?.destroy();
  }, [votes]);
  return (
    <div className="card">
      <h3 style={{marginBottom:16,fontSize:'1.1rem'}}>📊 Avaliações Gerais</h3>
      <div className="chart-container"><canvas ref={ref}></canvas></div>
    </div>
  );
}

function RecentVotes({votes, dishes}) {
  const recent = [...votes].sort((a,b)=>b.ts-a.ts).slice(0,6);
  const ratingMap = {4:{emoji:'😍',label:'Amei'},3:{emoji:'😊',label:'Gostei'},2:{emoji:'😐',label:'Mais/menos'},1:{emoji:'😞',label:'Não gostei'}};
  return (
    <div className="card">
      <h3 style={{marginBottom:16,fontSize:'1.1rem'}}>🗳️ Avaliações Recentes</h3>
      {recent.length ? recent.map(v => {
        const dish = dishes.find(d=>d.id===v.dishId);
        const r = ratingMap[v.rating]||{};
        return (
          <div key={v.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
            <span style={{fontSize:'1.5rem'}}>{r.emoji}</span>
            <div style={{flex:1}}>
              <div style={{fontWeight:800,fontSize:'0.85rem'}}>{dish?.name||'Prato'}</div>
              <div style={{fontSize:'0.75rem',color:'var(--muted)'}}>{new Date(v.ts).toLocaleString('pt-BR')}</div>
            </div>
            <span className={`badge ${v.rating>=3?'badge-green':v.rating===2?'badge-orange':'badge-red'}`}>{r.label}</span>
          </div>
        );
      }) : <div className="empty"><span className="emoji">📭</span><p>Nenhuma avaliação ainda</p></div>}
    </div>
  );
}

function MenusPage({user, toast}) {
  const [schools, setSchools] = useState([]);
  const [dishes, setDishes] = useState([]);
  const [menus, setMenus] = useState([]);
  const [selSchool, setSelSchool] = useState(user.schoolId||'');
  const [activeDay, setActiveDay] = useState(new Date().toISOString().slice(0,10));
  const [showModal, setShowModal] = useState(false);
  const [menuForm, setMenuForm] = useState({dishIds:[]});

  const weekDays = getWeekDays();

  useEffect(() => {
    dbGetAll('schools').then(s=>{setSchools(s);if(!selSchool&&s.length) setSelSchool(s[0].id);});
    dbGetAll('dishes').then(setDishes);
  }, []);
  useEffect(() => { if(selSchool) dbGetAll('menus').then(m=>setMenus(m.filter(x=>x.schoolId===selSchool))); }, [selSchool]);

  function getWeekDays() {
    const today = new Date(); const monday = new Date(today);
    monday.setDate(today.getDate() - today.getDay() + 1);
    return Array.from({length:7}, (_,i) => { const d = new Date(monday); d.setDate(monday.getDate()+i); return d.toISOString().slice(0,10); });
  }

  const dayNames = ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
  const activeMenu = menus.find(m=>m.date===activeDay);
  const activeDishes = dishes.filter(d=>(activeMenu?.dishIds||[]).includes(d.id));

  async function saveMenu() {
    const existing = menus.find(m=>m.date===activeDay);
    if (existing) await dbPut('menus', {...existing, dishIds:menuForm.dishIds});
    else await dbPut('menus', {id:uid(), schoolId:selSchool, date:activeDay, dishIds:menuForm.dishIds, createdAt:new Date().toISOString()});
    dbGetAll('menus').then(m=>setMenus(m.filter(x=>x.schoolId===selSchool)));
    setShowModal(false); toast('Cardápio salvo!');
  }

  return (
    <div>
      <div className="page-header" style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>

        <button className="btn btn-primary" onClick={()=>{setMenuForm({dishIds:activeMenu?.dishIds||[]});setShowModal(true);}}>+ Editar Cardápio</button>
      </div>

      {user.role==='superadmin' && (
        <div style={{marginBottom:20}}>
          <select className="filter-select" value={selSchool} onChange={e=>setSelSchool(e.target.value)}>
            {schools.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
        </div>
      )}

      <div className="card" style={{marginBottom:20}}>
        <div className="week-grid">
          {weekDays.map((d,i) => {
            const hasMenu = menus.some(m=>m.date===d&&m.dishIds?.length);
            const dateNum = new Date(d+'T12:00:00').getDate();
            return (
              <div key={d} className={`day-tab ${activeDay===d?'active':''} ${hasMenu?'has-menu':''}`} onClick={()=>setActiveDay(d)}>
                <div className="day-name">{dayNames[i]}</div>
                <div className="day-num">{dateNum}</div>
                {hasMenu && <div style={{fontSize:'0.6rem',color:'var(--green-dark)',fontWeight:800,marginTop:2}}>✓</div>}
              </div>
            );
          })}
        </div>
      </div>

      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <h3 style={{fontSize:'1rem'}}>Pratos do dia — {new Date(activeDay+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'})}</h3>
        </div>
        {activeDishes.length ? (
          <div className="dish-list">
            {activeDishes.map(d => (
              <div key={d.id} className="dish-item">
                <div className="dish-thumb">{d.photo?<img src={d.photo} alt={d.name} />:<span>🍽️</span>}</div>

      </div>

      {showModal && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowModal(false)}>
          <div className="modal">
            <div className="modal-header">
              <h3 className="modal-title">Editar Cardápio</h3>
              <button className="modal-close" onClick={()=>setShowModal(false)}>✕</button>
            </div>
            <p style={{fontSize:'0.85rem',color:'var(--muted)',marginBottom:16}}>Selecione os pratos para {new Date(activeDay+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'})}:</p>

    </div>
  );
}

// ===================== MINI CALENDAR PICKER =====================
function CalendarPicker({value, onChange, label}) {
  const [open, setOpen] = useState(false);
  const [viewYear, setViewYear] = useState(()=>value ? parseInt(value.slice(0,4)) : new Date().getFullYear());
  const [viewMonth, setViewMonth] = useState(()=>value ? parseInt(value.slice(5,7))-1 : new Date().getMonth());
  const ref = useRef(null);

  useEffect(() => {
    function handleClick(e) { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener('mousedown', handleClick);
    return () => document.removeEventListener('mousedown', handleClick);
  }, []);

  const monthNames = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const dayNames = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

  function getDays() {
    const first = new Date(viewYear, viewMonth, 1).getDay();
    const total = new Date(viewYear, viewMonth+1, 0).getDate();
    return {first, total};
  }

  function prevMonth() { if(viewMonth===0){setViewMonth(11);setViewYear(y=>y-1);}else setViewMonth(m=>m-1); }
  function nextMonth() { if(viewMonth===11){setViewMonth(0);setViewYear(y=>y+1);}else setViewMonth(m=>m+1); }

  function selectDay(day) {
    const d = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    onChange(d); setOpen(false);
  }

  const {first, total} = getDays();
  const displayVal = value ? new Date(value+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'}) : label;

  return (
    <div ref={ref} style={{position:'relative',display:'inline-block'}}>
      <button onClick={()=>setOpen(o=>!o)} className="filter-select" style={{cursor:'pointer',display:'flex',alignItems:'center',gap:8,background:value?'var(--green-light)':'#fff',borderColor:value?'var(--green)':'var(--border)',color:value?'var(--green-dark)':'var(--text)'}}>
        📅 {displayVal}
        {value && <span onClick={e=>{e.stopPropagation();onChange('');}} style={{marginLeft:4,fontWeight:900,color:'var(--muted)',fontSize:'0.9rem'}}>✕</span>}
      </button>
      {open && (
        <div style={{position:'absolute',top:'calc(100% + 8px)',left:0,zIndex:500,background:'#fff',borderRadius:16,boxShadow:'0 8px 40px rgba(0,0,0,0.18)',padding:16,width:280,border:'2px solid var(--green-light)'}}>
          {/* Header */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
            <button onClick={prevMonth} style={{background:'var(--bg)',border:'none',borderRadius:8,padding:'4px 10px',cursor:'pointer',fontSize:'1rem',fontWeight:900}}>‹</button>
            <span style={{fontFamily:'Fredoka One',fontSize:'1rem',color:'var(--green-dark)'}}>{monthNames[viewMonth]} {viewYear}</span>
            <button onClick={nextMonth} style={{background:'var(--bg)',border:'none',borderRadius:8,padding:'4px 10px',cursor:'pointer',fontSize:'1rem',fontWeight:900}}>›</button>
          </div>
          {/* Day names */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:4}}>
            {dayNames.map(d=><div key={d} style={{textAlign:'center',fontSize:'0.65rem',fontWeight:800,color:'var(--muted)',padding:'4px 0'}}>{d}</div>)}
          </div>
          {/* Days grid */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
            {Array.from({length:first}).map((_,i)=><div key={'e'+i}/>)}
            {Array.from({length:total}).map((_,i)=>{
              const day = i+1;
              const dateStr = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
              const isSelected = value===dateStr;
              const isToday = dateStr===new Date().toISOString().slice(0,10);
              return (
                <button key={day} onClick={()=>selectDay(day)} style={{
                  textAlign:'center',padding:'6px 0',borderRadius:8,border:'none',cursor:'pointer',fontSize:'0.82rem',fontWeight:isToday||isSelected?900:600,
                  background:isSelected?'var(--green)':isToday?'var(--green-light)':'transparent',
                  color:isSelected?'#fff':isToday?'var(--green-dark)':'var(--text)',
                  transition:'all 0.15s'
                }}>{day}</button>
              );
            })}
          </div>
          {/* Quick picks */}
          <div style={{borderTop:'1px solid var(--border)',marginTop:12,paddingTop:10,display:'flex',gap:6,flexWrap:'wrap'}}>
            {[['Hoje',0],['Ontem',1],['7 dias atrás',7]].map(([lbl,days])=>{
              const d = new Date(); d.setDate(d.getDate()-days);
              const ds = d.toISOString().slice(0,10);
              return <button key={lbl} onClick={()=>{onChange(ds);setOpen(false);}} style={{fontSize:'0.72rem',fontWeight:800,padding:'4px 10px',borderRadius:8,border:'2px solid var(--border)',background:'var(--bg)',cursor:'pointer',color:'var(--green-dark)'}}>{lbl}</button>;
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ===================== REPORTS PAGE =====================
function ReportsPage({user}) {
  const [dishes, setDishes] = useState([]);
  const [votes, setVotes] = useState([]);
  const [schools, setSchools] = useState([]);
  const today = new Date().toISOString().slice(0,10);
  const monthAgo = new Date(Date.now()-30*24*60*60*1000).toISOString().slice(0,10);
  const [filters, setFilters] = useState({period:'custom', dateFrom:monthAgo, dateTo:today, schoolId:user.schoolId||'', dishId:''});
  const [tab, setTab] = useState('dish');
  const pieRef = useRef(null); const barRef = useRef(null); const rankRef = useRef(null);
  const pieChart = useRef(null); const barChart = useRef(null); const rankChart = useRef(null);

  useEffect(() => {
    Promise.all([dbGetAll('dishes'),dbGetAll('votes'),dbGetAll('schools')]).then(([d,v,s])=>{setDishes(d);setVotes(v);setSchools(s);});
  }, []);

  useEffect(() => { buildCharts(); }, [votes,dishes,filters,tab]);

  function applyQuickPeriod(period) {
    const now = new Date();
    const to = now.toISOString().slice(0,10);
    let from = to;
    if (period==='daily') { from = to; }
    else if (period==='weekly') { const d=new Date(now); d.setDate(now.getDate()-6); from=d.toISOString().slice(0,10); }
    else if (period==='monthly') { const d=new Date(now); d.setMonth(now.getMonth()-1); from=d.toISOString().slice(0,10); }
    else if (period==='all') { from='2020-01-01'; }
    setFilters(p=>({...p, period, dateFrom:from, dateTo:to}));
  }

  function filterVotes(v) {
    let fv = user.role==='superadmin' ? v : v.filter(x=>x.schoolId===user.schoolId);
    if (filters.schoolId) fv = fv.filter(x=>x.schoolId===filters.schoolId);
    if (filters.dishId) fv = fv.filter(x=>x.dishId===filters.dishId);
    if (filters.dateFrom) fv = fv.filter(x=>x.date>=filters.dateFrom);
    if (filters.dateTo) fv = fv.filter(x=>x.date<=filters.dateTo);
    return fv;
  }

  function buildCharts() {
    const fv = filterVotes(votes);
    // Pie chart - rating distribution
    if (pieRef.current) {
      if (pieChart.current) pieChart.current.destroy();
      const counts = [0,0,0,0];
      fv.forEach(v=>{if(v.rating>=1&&v.rating<=4)counts[v.rating-1]++;});
      pieChart.current = new Chart(pieRef.current, {
        type:'doughnut',
        data:{labels:['😞 Não gostei','😐 Mais/menos','😊 Gostei','😍 Amei!'],datasets:[{data:counts,backgroundColor:['#e74c3c','#f39c12','#3498db','#2ecc71'],borderWidth:0,hoverOffset:8}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{family:'Nunito',size:12},padding:16}}}}
      });
    }
    // Bar chart - by dish
    if (barRef.current) {
      if (barChart.current) barChart.current.destroy();
      const dishVotes = {};
      fv.forEach(v => {
        if (!dishVotes[v.dishId]) dishVotes[v.dishId]=[0,0,0,0];
        if(v.rating>=1&&v.rating<=4) dishVotes[v.dishId][v.rating-1]++;
      });
      const labels = Object.keys(dishVotes).map(id=>dishes.find(d=>d.id===id)?.name||'?').slice(0,8);
      const ds = [
        {label:'Amei!',data:Object.values(dishVotes).map(c=>c[3]).slice(0,8),backgroundColor:'#2ecc71'},
        {label:'Gostei',data:Object.values(dishVotes).map(c=>c[2]).slice(0,8),backgroundColor:'#3498db'},
        {label:'Mais/menos',data:Object.values(dishVotes).map(c=>c[1]).slice(0,8),backgroundColor:'#f39c12'},
        {label:'Não gostei',data:Object.values(dishVotes).map(c=>c[0]).slice(0,8),backgroundColor:'#e74c3c'},
      ];
      barChart.current = new Chart(barRef.current, {
        type:'bar',
        data:{labels,datasets:ds},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top'}},scales:{x:{stacked:true},y:{stacked:true}}}
      });
    }
    // Rank chart
    if (rankRef.current) {
      if (rankChart.current) rankChart.current.destroy();
      const scores = {};
      fv.forEach(v => { scores[v.dishId]=(scores[v.dishId]||0)+v.rating; });
      const sorted = Object.entries(scores).sort((a,b)=>b[1]-a[1]).slice(0,8);
      rankChart.current = new Chart(rankRef.current, {
        type:'bar',
        data:{
          labels:sorted.map(([id])=>dishes.find(d=>d.id===id)?.name||'?'),
          datasets:[{label:'Score Total',data:sorted.map(([,s])=>s),backgroundColor:sorted.map((_,i)=>i<3?'#2ecc71':i>=sorted.length-2?'#e74c3c':'#3498db'),borderRadius:8}]
        },
        options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}}}
      });
    }
  }

  const mySchools = user.role==='superadmin' ? schools : schools.filter(s=>s.id===user.schoolId);
  const fv = filterVotes(votes);
  const total = fv.length;
  const loved = fv.filter(v=>v.rating===4).length;
  const liked = fv.filter(v=>v.rating===3).length;
  const meh = fv.filter(v=>v.rating===2).length;
  const disliked = fv.filter(v=>v.rating===1).length;
  const satisfaction = total ? Math.round(((loved*4+liked*3+meh*2+disliked*1)/(total*4))*100) : 0;

  // Pratos únicos por nome, filtrados pela escola selecionada (sem duplicatas)
  const dishesForFilter = (() => {
    const scopeVotes = user.role==='superadmin' ? votes : votes.filter(v=>v.schoolId===user.schoolId);
    const filtered = filters.schoolId ? scopeVotes.filter(v=>v.schoolId===filters.schoolId) : scopeVotes;
    const dishIdsWithVotes = [...new Set(filtered.map(v=>v.dishId))];
    const seen = new Set();
    return dishes.filter(d => {
      if (!dishIdsWithVotes.includes(d.id)) return false;
      const key = d.name.trim().toLowerCase();
      if (seen.has(key)) return false;
      seen.add(key); return true;
    });
  })();

  const quickPeriods = [
    {key:'daily', label:'Hoje'},
    {key:'weekly', label:'Esta semana'},
    {key:'monthly', label:'Este mês'},
    {key:'all', label:'Todo período'},
  ];

  return (
    <div>
      <div className="page-header"><h2>📈 Relatórios</h2><p>Análise das avaliações — dados para o PNAE</p></div>

      {/* FILTROS */}
      <div className="card" style={{marginBottom:20,padding:'16px 20px'}}>
        <div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'center',marginBottom:12}}>
          {user.role==='superadmin' && (
            <select className="filter-select" value={filters.schoolId} onChange={e=>setFilters(p=>({...p,schoolId:e.target.value,dishId:''}))}>
              <option value="">🏫 Todas as escolas</option>
              {mySchools.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
            </select>
          )}
          <select className="filter-select" value={filters.dishId} onChange={e=>setFilters(p=>({...p,dishId:e.target.value}))}>
            <option value="">🍽️ Todos os pratos</option>
            {dishesForFilter.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}
          </select>
        </div>

        {/* Atalhos de período */}
        <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center',marginBottom:12}}>
          <span style={{fontSize:'0.78rem',fontWeight:800,color:'var(--muted)',marginRight:4}}>PERÍODO RÁPIDO:</span>
          {quickPeriods.map(p=>(
            <button key={p.key} onClick={()=>applyQuickPeriod(p.key)}
              style={{padding:'5px 14px',borderRadius:99,border:'2px solid',fontSize:'0.78rem',fontWeight:800,cursor:'pointer',transition:'all 0.15s',
                borderColor:filters.period===p.key?'var(--green)':'var(--border)',
                background:filters.period===p.key?'var(--green)':'#fff',
                color:filters.period===p.key?'#fff':'var(--muted)'}}>
              {p.label}
            </button>
          ))}
        </div>

        {/* Calendários de/até */}
        <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
          <span style={{fontSize:'0.78rem',fontWeight:800,color:'var(--muted)'}}>DIA ESPECÍFICO / INTERVALO:</span>
          <CalendarPicker label="Data inicial" value={filters.dateFrom}
            onChange={v=>setFilters(p=>({...p,dateFrom:v,period:'custom'}))} />
          <span style={{color:'var(--muted)',fontWeight:800}}>até</span>
          <CalendarPicker label="Data final" value={filters.dateTo}
            onChange={v=>setFilters(p=>({...p,dateTo:v,period:'custom'}))} />
          {filters.dateFrom && filters.dateTo && filters.dateFrom===filters.dateTo && (
            <span className="badge badge-green">📅 Dia: {new Date(filters.dateFrom+'T12:00:00').toLocaleDateString('pt-BR')}</span>
          )}
          {filters.dateFrom && filters.dateTo && filters.dateFrom!==filters.dateTo && (
            <span className="badge badge-blue">📅 {new Date(filters.dateFrom+'T12:00:00').toLocaleDateString('pt-BR')} → {new Date(filters.dateTo+'T12:00:00').toLocaleDateString('pt-BR')}</span>
          )}
        </div>
      </div>

      <div className="grid-4" style={{marginBottom:24}}>
        <div className="stat-card"><div className="stat-icon" style={{background:'#d5f5e3'}}><span>🗳️</span></div><div><div className="stat-val" style={{color:'var(--green-dark)'}}>{total}</div><div className="stat-label">Total de Avaliações</div></div></div>
        <div className="stat-card"><div className="stat-icon" style={{background:'#d5f5e3'}}><span>😍</span></div><div><div className="stat-val" style={{color:'var(--green-dark)'}}>{loved}</div><div className="stat-label">Amaram</div></div></div>
        <div className="stat-card"><div className="stat-icon" style={{background:'#fef9e7'}}><span>😐</span></div><div><div className="stat-val" style={{color:'var(--orange)'}}>{meh}</div><div className="stat-label">Mais ou menos</div></div></div>
        <div className="stat-card"><div className="stat-icon" style={{background:'#fdedec'}}><span>😞</span></div><div><div className="stat-val" style={{color:'var(--red)'}}>{disliked}</div><div className="stat-label">Não gostaram</div></div></div>
      </div>

      <div style={{marginBottom:24,background:'linear-gradient(135deg,#1a6b3c,#27ae60)',borderRadius:18,padding:'20px 28px',color:'#fff',display:'flex',alignItems:'center',gap:24}}>
        <div style={{fontSize:'3rem'}}>🏆</div>
        <div>
          <div style={{fontFamily:'Fredoka One',fontSize:'2.5rem',lineHeight:1}}>{satisfaction}%</div>
          <div style={{fontWeight:700,opacity:0.85,marginTop:4}}>Índice de Satisfação Geral</div>
        </div>
        <div style={{flex:1}}><div style={{background:'rgba(255,255,255,0.2)',borderRadius:99,height:10,overflow:'hidden'}}><div style={{background:'#fff',height:'100%',width:`${satisfaction}%`,borderRadius:99,transition:'width 1s'}}></div></div></div>
      </div>

      <div className="grid-2" style={{marginBottom:24}}>
        <div className="card">
          <h3 style={{fontSize:'1rem',marginBottom:16}}>📊 Distribuição das Avaliações</h3>
          <div className="chart-container"><canvas ref={pieRef}></canvas></div>
        </div>
        <div className="card">
          <h3 style={{fontSize:'1rem',marginBottom:16}}>🏅 Ranking de Pratos</h3>
          <div className="chart-container"><canvas ref={rankRef}></canvas></div>
        </div>
      </div>

      <div className="card">
        <h3 style={{fontSize:'1rem',marginBottom:16}}>📊 Avaliações por Prato</h3>
        <div className="chart-container-lg"><canvas ref={barRef}></canvas></div>
      </div>
    </div>
  );
}

// ===================== INVITES PAGE =====================
function InvitesPage({user, toast}) {
  const [invites, setInvites] = useState([]);
  const [form, setForm] = useState({email:''});
  const [users, setUsers] = useState([]);
  const [confirm, confirmDialog] = useConfirm();

  useEffect(() => { load(); }, []);
  async function load() {
    const [i,u] = await Promise.all([dbGetAll('invites'),dbGetAll('users')]);
    setInvites(i.filter(x=>x.fromUserId===user.id)); setUsers(u);
  }

  async function sendInvite() {
    if (!form.email) return;
    const token = uid()+uid();
    await dbPut('invites', {id:uid(), fromUserId:user.id, fromUserName:user.name, toEmail:form.email, token, status:'pending', createdAt:new Date().toISOString()});
    setForm({email:''}); load(); toast('Convite enviado!');
  }

  async function remove(id) {
    const ok = await confirm({icon:'✉️', title:'Cancelar Convite', message:'Deseja cancelar este convite?', confirmLabel:'Cancelar Convite'});
    if (!ok) return;
    await dbDelete('invites', id); load(); toast('Convite cancelado.','error');
  }

  const getLink = (token) => `${window.location.origin}${window.location.pathname}?invite=${token}`;

  return (
    <div>
      <div className="page-header"><h2>✉️ Convites de Colaboração</h2><p>Convide outro nutricionista para acessar seus dados</p></div>
      <div className="card" style={{marginBottom:20}}>
        <h3 style={{fontSize:'1rem',marginBottom:14}}>Enviar Convite</h3>
        <p style={{fontSize:'0.85rem',color:'var(--muted)',marginBottom:16}}>O nutricionista convidado terá acesso aos seus dados somente através do link de convite.</p>
        <div style={{display:'flex',gap:12}}>
          <input className="form-input" type="email" placeholder="email@nutricionista.com" value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))} style={{maxWidth:360}} />
          <button className="btn btn-primary" onClick={sendInvite}>✉️ Enviar Convite</button>
        </div>
      </div>
      <div className="card">
        <h3 style={{fontSize:'1rem',marginBottom:16}}>Convites Enviados</h3>
        {invites.length ? invites.map(inv => (
          <div key={inv.id} style={{padding:'14px',background:'var(--bg)',borderRadius:12,marginBottom:10}}>
            <div style={{display:'flex',justify:'space-between',alignItems:'center',gap:12,flexWrap:'wrap'}}>
              <div>
                <div style={{fontWeight:800,fontSize:'0.88rem'}}>📧 {inv.toEmail}</div>
                <div style={{fontSize:'0.75rem',color:'var(--muted)',marginTop:2}}>{new Date(inv.createdAt).toLocaleDateString('pt-BR')}</div>
              </div>
              <span className={`badge ${inv.status==='pending'?'badge-orange':inv.status==='accepted'?'badge-green':'badge-red'}`}>{inv.status==='pending'?'⏳ Pendente':inv.status==='accepted'?'✅ Aceito':'❌ Cancelado'}</span>
              <button className="btn btn-danger btn-sm" onClick={()=>remove(inv.id)}>🗑️</button>
            </div>
            <div style={{marginTop:10}}>
              <div style={{fontSize:'0.72rem',color:'var(--muted)',marginBottom:4,fontWeight:700}}>LINK DE CONVITE:</div>
              <div className="invite-link">{getLink(inv.token)}</div>
              <button className="btn btn-outline btn-sm" style={{marginTop:8}} onClick={()=>{navigator.clipboard.writeText(getLink(inv.token));toast('Link copiado!');}}>📋 Copiar Link</button>
            </div>
          </div>
        )) : <div className="empty"><span className="emoji">✉️</span><p>Nenhum convite enviado</p></div>}
      </div>
      {confirmDialog}
    </div>
  );
}

// ===================== MAIN APP =====================
function App() {
  const [user, setUser] = useState(null);
  const [loadingSession, setLoadingSession] = useState(true);
  const [page, setPage] = useState('dashboard');
  const [votingMode, setVotingMode] = useState(false);
  const [toast, setToast] = useState(null);
  const [schools, setSchools] = useState([]);
  const [users, setUsers] = useState([]);
  const [menus, setMenus] = useState([]);
  const [dishes, setDishes] = useState([]);
  const [votes, setVotes] = useState([]);

  // Seed e restaurar sessão salva
  useEffect(() => {
    seedData().then(async () => {
      try {
        const saved = localStorage.getItem('nutriavalia_session');
        if (saved) {
          const { userId } = JSON.parse(saved);
          const u = await dbGet('users', userId);
          if (u) { setUser(u); }
        }
      } catch(e) {}
      setLoadingSession(false);
    });
  }, []);

  useEffect(() => {
    if (!user) return;
    Promise.all([dbGetAll('schools'),dbGetAll('users'),dbGetAll('menus'),dbGetAll('dishes'),dbGetAll('votes')]).then(([s,u,m,d,v]) => {
      setSchools(s); setUsers(u); setMenus(m); setDishes(d); setVotes(v);
    });
  }, [user, page]);

  function handleLogin(u) {
    setUser(u);
    setPage('dashboard');
    localStorage.setItem('nutriavalia_session', JSON.stringify({ userId: u.id }));
  }

  function handleLogout() {
    setUser(null);
    setPage('dashboard');
    localStorage.removeItem('nutriavalia_session');
  }

  function showToast(msg, type='success') { setToast({msg,type}); }

  const navItems = [
    {key:'dashboard', label:'Dashboard', icon:'📊', roles:['superadmin','nutritionist']},
    {key:'voting', label:'Modo Votação', icon:'🗳️', roles:['superadmin','nutritionist']},
    null, // separator
    {key:'menus', label:'Cardápios', icon:'📅', roles:['superadmin','nutritionist']},
    {key:'dishes', label:'Pratos', icon:'🍽️', roles:['superadmin','nutritionist']},
    {key:'reports', label:'Relatórios', icon:'📈', roles:['superadmin','nutritionist']},
    null,
    {key:'schools', label:'Escolas', icon:'🏫', roles:['superadmin']},
    {key:'users', label:'Usuários', icon:'👩‍⚕️', roles:['superadmin']},
    {key:'invites', label:'Colaboração', icon:'✉️', roles:['nutritionist']},
  ];

  if (loadingSession) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(135deg,#1a6b3c,#27ae60)'}}>
      <div style={{textAlign:'center',color:'#fff'}}>
        <div style={{fontSize:'4rem',marginBottom:16}}>🥗</div>
        <div style={{fontFamily:'Fredoka One',fontSize:'1.8rem'}}>NutriAvalia</div>
        <div style={{marginTop:12,opacity:0.75,fontWeight:700}}>Carregando...</div>
      </div>
    </div>
  );

  if (!user) return <LoginPage onLogin={handleLogin} />;

  if (votingMode) return (
    <div>
      <div style={{position:'fixed',top:16,right:16,zIndex:999}}>
        <button className="btn btn-outline" onClick={()=>setVotingMode(false)} style={{background:'#fff'}}>← Sair do Modo Votação</button>
      </div>
      <VotingPage user={user} />
      {toast && <Toast msg={toast.msg} type={toast.type} onDone={()=>setToast(null)} />}
    </div>
  );

  const school = schools.find(s=>s.id===user.schoolId);

  return (
    <div className="app">
      {/* Topbar mobile */}
      <div className="mobile-topbar">
        <h1>🥗 NutriAvalia</h1>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div className="mob-user">{user.name}</div>
          <button onClick={handleLogout} style={{background:'rgba(255,255,255,0.2)',border:'none',color:'#fff',borderRadius:8,padding:'5px 12px',fontWeight:800,fontSize:'0.75rem',cursor:'pointer'}}>Sair</button>
        </div>
      </div>

      <aside className="sidebar">
        <div className="sidebar-logo">
          <h1>🥗 NutriAvalia</h1>
          <p>Sistema Nutricional Escolar</p>
        </div>
        {school && <div className="sidebar-school"><span>Escola</span>{school.name}</div>}
        <nav className="sidebar-nav">
          {navItems.map((item, i) => {
            if (!item) return <div key={i} className="nav-section" style={{marginTop:8}}>──────────</div>;
            if (!item.roles.includes(user.role)) return null;
            if (item.key==='voting') return (
              <div key={item.key} className="nav-item" onClick={()=>setVotingMode(true)}>
                <span className="icon">{item.icon}</span><span>{item.label}</span>
              </div>
            );
            return (
              <div key={item.key} className={`nav-item ${page===item.key?'active':''}`} onClick={()=>setPage(item.key)}>
                <span className="icon">{item.icon}</span><span>{item.label}</span>
              </div>
            );
          })}
        </nav>
        <div className="sidebar-footer">
          <div className="sidebar-user">
            <div className="avatar">{user.name?.[0]?.toUpperCase()}</div>
            <div className="user-info">
              <div className="user-name">{user.name}</div>
              <div className="user-role">{user.role==='superadmin'?'Super Admin':'Nutricionista'}</div>
            </div>
            <button className="logout-btn" onClick={handleLogout}>Sair</button>
          </div>
        </div>
      </aside>
      <main className="main">
        {page==='dashboard' && <Dashboard user={user} schools={schools} users={users} menus={menus} dishes={dishes} votes={votes} />}
        {page==='schools' && user.role==='superadmin' && <SchoolsPage user={user} toast={showToast} />}
        {page==='users' && user.role==='superadmin' && <UsersPage user={user} toast={showToast} />}
        {page==='menus' && <MenusPage user={user} toast={showToast} />}
        {page==='dishes' && <DishesPage user={user} toast={showToast} />}
        {page==='reports' && <ReportsPage user={user} />}
        {page==='invites' && <InvitesPage user={user} toast={showToast} />}
      </main>
      {toast && <Toast msg={toast.msg} type={toast.type} onDone={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
